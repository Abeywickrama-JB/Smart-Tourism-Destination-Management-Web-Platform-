<!DOCTYPE html>
<html>
<head>
    <title>Test LocalStorage Preferences</title>
</head>
<body>
    <h1>Testing LocalStorage Preferences</h1>
    <div id="output"></div>
    
    <script>
        // Check what's in localStorage
        const savedPreferences = localStorage.getItem('userPreferences');
        const output = document.getElementById('output');
        
        if (savedPreferences) {
            const preferences = JSON.parse(savedPreferences);
            output.innerHTML = `
                <h2>Found Preferences:</h2>
                <pre>${JSON.stringify(preferences, null, 2)}</pre>
                
                <h3>Individual Values:</h3>
                <ul>
                    <li>Destination Type: ${preferences.destinationType}</li>
                    <li>Budget: ${preferences.budget}</li>
                    <li>Best Time: ${preferences.bestTimeToVisit}</li>
                    <li>Difficulty: ${preferences.difficultyLevel}</li>
                    <li>Group Size: ${preferences.groupSize}</li>
                </ul>
                
                <h3>Expected Format:</h3>
                <pre>{
  "destinationType": "beach",
  "budget": "low",
  "bestTimeToVisit": "october-december", 
  "difficultyLevel": "challenging",
  "groupSize": "family"
}</pre>
            `;
        } else {
            output.innerHTML = '<h2>No preferences found in localStorage</h2><p>Please complete the preference questionnaire first.</p>';
        }
    </script>
</body>
</html>
